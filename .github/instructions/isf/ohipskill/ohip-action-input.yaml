# OHIP Action Implementation Input Template
# Copy this file, fill in your values, and paste into chat with @ohipilot

# ============================================================================
# SECTION 1: ACTION TYPE & EVENTS (Required)
# ============================================================================

action:
  # PascalCase action type name (e.g., Profiles, RatePlan, Blocks, Hurdles)
  name: "Hurdles"
  
  # List of business events this action handles
  # IMPORTANT: Use exact casing and spaces as they appear in BusinessEventType.Header.EventName
  events:
    - "NEW HURDLE"
    - "UPDATE HURDLE"
    - "DELETE HURDLE"
    
    # Add more events as needed
    # - "DELETE PROFILE"

# ============================================================================
# GIT OPERATIONS (Optional)
# ============================================================================

git:
  # Create a new feature branch for this implementation?
  create_feature_branch: false  # true or false
  
  # User story ID (required if create_feature_branch is true)
  user_story_id: "US11111"  # e.g., US12345, US67890
  
  # Short description for branch name (used in: feature/int/US{id}_{description})
  branch_description: "HurdlesImplementation"  # PascalCase or kebab-case, no spaces
  
  # Base branch to create from (typically 'master')
  base_branch: "master"  # Default: master
  
  # ⚠️ IMPORTANT - UNCOMMITTED CHANGES:
  # - Agent will checkout base_branch (master) and create new branch from latest master
  # - If you have uncommitted changes in your current branch, COMMIT or STASH them first
  # - Agent will check for uncommitted changes and warn you before switching branches
  # - This prevents accidental loss of work in your current branch
  #
  # Workflow (if create_feature_branch=true):
  #   1. Check for uncommitted changes → warn if found
  #   2. Fetch latest from remote
  #   3. Checkout base_branch and pull latest
  #   4. Create new branch: feature/int/{user_story_id}_{branch_description}
  #   5. Checkout new branch
  #   6. Proceed with implementation
  #
  # If create_feature_branch=false:
  #   - Continue in current branch (no branch switching)

# ============================================================================
# SECTION 2: CONSOLIDATION RULES (Required)
# ============================================================================

consolidation:
  # Is consolidation needed for this action type?
  enabled: false  # true or false
  
  # If enabled=true, specify consolidation strategy
  strategy: "MostRecent"  # Options: MostRecent, Earliest, Custom
  
  # Key extraction - how to identify unique business events for consolidation
  # Multiple key sources can be specified for composite keys
  keys:
    - source: "Detail"  # Options: Detail, MetaData, PrimaryKey, Custom
      element_name: "NAME ID"  # Required if source=Detail
      description: "Profile ID from Detail element"
    
    - source: "MetaData"
      element_name: "PmsChainCode"
      description: "Chain code from metadata"
  
  # Custom consolidation logic (only if strategy=Custom)
  custom_logic: |
    When NEW PROFILE and UPDATE PROFILE events exist for same ProfileId + Chain,
    keep the most recent UPDATE PROFILE event as it contains latest data.

# ============================================================================
# SECTION 3: API INTEGRATION (Optional)
# ============================================================================

api_integration:
  # Does this action type require calling OHIP APIs via DumboBroker?
  required: false  # true or false
  
  # If required=true, provide API details below
  # If required=false, skip the rest of this section
  
  # API endpoint path (without hostname)
  # Use {{VariableName}} for path parameters
  endpoint_path: "/crm/v1/profiles/{{ProfileId}}"
  
  # Path parameters extraction
  path_parameters:
    - name: "ProfileId"
      source: "Detail"  # Options: Detail, MetaData, PrimaryKey, Custom
      element_name: "NAME ID"  # Required if source=Detail
      extraction_logic: "Extract NewValue from Detail element where ElementName='NAME ID'"
  
  # Query parameters (optional)
  query_parameters:
    - name: "fetchInstructions"
      repeatable: true  # Can this parameter appear multiple times?
      values:
        - "Address"
        - "Communication"
        - "Comment"
        - "Correspondence"
        - "DeliveryMethods"
        - "FutureReservation"
        - "GdsNegotiatedRate"
        - "HistoryReservation"
        - "Indicators"
        - "Keyword"
        - "Membership"
        - "NegotiatedRate"
        - "Preference"
        - "Profile"
        - "Relationship"
        - "SalesInfo"
        - "Subscriptions"
        - "WebUserAccount"
  
  # Request model class to create
  request_model:
    class_name: "OhipProfilesRequest"
    namespace: "Synxis.Application.InterfaceBusiness.Ohip.ApiModels"
    properties:
      - name: "HotelId"
        type: "int"
        source: "BusinessEvent.HotelId"
      - name: "ProfileId"
        type: "string"
        source: "Detail element NAME ID NewValue"
      - name: "FetchInstructions"
        type: "List<string>"
        source: "Constant list defined in OhipConstants"
  
  # Response type for ResolveResponse<T>
  response_type: "object"  # Use "object" as placeholder, or specify concrete type

# ============================================================================
# SECTION 4: ROUTING TYPES (Required - NO TBD VALUES)
# ============================================================================

routing:
  # These types wire the request through the system
  # IMPORTANT: All three must be defined (no "TBD" values)
  # Implementation will NOT proceed if any value is TBD
  
  ari_request_type: "CreateProfile"  # Enum value in AriRequestType
  conversation_request_type: "CreateProfile"  # Enum value in ConversationRequestType
  source_data_type: "ProfileDto"  # Enum value for source data serialization

