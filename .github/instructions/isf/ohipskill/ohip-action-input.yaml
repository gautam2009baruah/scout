# ============================================================================
# SECTION 6: DTO MAPPING (Required for EndToEnd)
# ============================================================================

dto_mapping:
  # Class names to create (agent will generate skeleton/boilerplate only)
  handler_class_name: "HurdlesDtoHandler"  # e.g., ProfilesDtoHandler, BlocksDtoHandler
  assembler_class_name: "HurdlesDtoAssembler"  # e.g., ProfilesDtoAssembler, BlocksDtoAssembler
  
  # OXI DTO class to map to (used as return type in assembler methods)
  # This class should already exist in InterfaceDto project
  oxi_dto_class: "HurdleDto"  # e.g., ProfileDto, BlockDto, RatePlanDto
  
  # Interface Request Type ID for routing (get next available ID from InterfaceRequestType enum)
  interface_request_type_id: 120  # Use next sequential ID, must match database value
  
  # Notes for manual implementation
  mapping_notes: |
    Developer must implement field mappings in assembler.
    Refer to user story for field-level mapping requirements.
    Agent creates structure only - actual mapping logic is manual.

# ============================================================================
# USAGE WORKFLOW
# ============================================================================
#
# WHAT HAPPENS AUTOMATICALLY:
# - Preflight validation runs FIRST (always, for all modes)
# - If git.create_feature_branch=true, new branch is created AFTER validation passes
# - Implementation proceeds only if validation succeeds
#
# Individual Mode Usage:
# 1. Fill this template with your values
# 2. (Optional) Set git.create_feature_branch=true
# 3. Run: @ohipilot /neweventtype or /eventhandler or /apiintegration or /dtomapping or /tests
# 4. Agent automatically runs preflight validation first, then executes the specific mode
#
# EndToEnd Mode Usage (RECOMMENDED):
# 1. Fill this template completely (all sections including dto_mapping)
# 2. (Optional) Set git.create_feature_branch=true to create feature branch automatically
# 3. Say: "implement end to end" or "Mode: EndToEnd"
# 4. Agent automatically:
#    a. Runs preflight validation
#    b. Creates feature branch (if enabled)
#    c. Executes ALL phases: neweventtype → eventhandler → apiintegration → dtomapping → tests
#    d. Runs final validation
#
# Validation-Only (Optional):
# - Run: @ohipilot /preflight [paste this file]
# - This ONLY validates the YAML without implementing anything
# - Use this to check if your input is valid before starting implementation
