apiVersion: apps/v1
kind: Deployment
metadata:
  name: scout-chatbot-api
  labels:
    app: scout-chatbot-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scout-chatbot-api
  template:
    metadata:
      labels:
        app: scout-chatbot-api
    spec:
      containers:
        - name: chatbot-api
          image: scout/chatbot-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4200
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: scout-chatbot-api-secrets
                  key: DATABASE_URL
            - name: CHATBOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: scout-chatbot-api-secrets
                  key: CHATBOT_API_KEY
            - name: CHATBOT_API_PORT
              value: "4200"
            - name: CHATBOT_API_HOST
              value: "0.0.0.0"
            - name: CHATBOT_API_ALLOWED_ORIGINS
              value: "*"
          readinessProbe:
            httpGet:
              path: /ready
              port: 4200
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4200
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: scout-chatbot-api
spec:
  selector:
    app: scout-chatbot-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4200
  type: ClusterIP
