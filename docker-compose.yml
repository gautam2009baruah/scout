services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: scout-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scout}
      POSTGRES_USER: ${POSTGRES_USER:-scout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scout_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - scout-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: scout-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - scout-ollama-data:/root/.ollama

  ollama-init:
    image: ollama/ollama:latest
    container_name: scout-ollama-init
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama pull ${OLLAMA_LLM_MODEL:-qwen3:0.6b} &&
       ollama pull ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}"
    restart: "no"

volumes:
  scout-postgres-data:
  scout-ollama-data:
