version: "3.9"

services:
  smart-finder-api:
    build:
      context: ../..
      dockerfile: http-api/smart-finder-api/Dockerfile
    container_name: scout-smart-finder-api
    restart: unless-stopped
    ports:
      - "4302:4302"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SMART_FINDER_API_HOST: 0.0.0.0
      SMART_FINDER_API_PORT: 4302
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4302/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
