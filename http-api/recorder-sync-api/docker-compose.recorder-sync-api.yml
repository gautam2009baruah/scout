version: "3.9"

services:
  recorder-sync-api:
    build:
      context: ../..
      dockerfile: http-api/recorder-sync-api/Dockerfile
    container_name: scout-recorder-sync-api
    restart: unless-stopped
    ports:
      - "4301:4301"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RECORDER_SYNC_API_HOST: 0.0.0.0
      RECORDER_SYNC_API_PORT: 4301
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4301/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
