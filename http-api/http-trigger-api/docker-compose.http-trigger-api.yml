version: "3.9"

services:
  http-trigger-api:
    build:
      context: ../..
      dockerfile: http-api/http-trigger-api/Dockerfile
    container_name: scout-http-trigger-api
    restart: unless-stopped
    ports:
      - "4303:4303"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      HTTP_TRIGGER_API_HOST: 0.0.0.0
      HTTP_TRIGGER_API_PORT: 4303
      NODE_ENV: ${NODE_ENV:-production}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4303/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
