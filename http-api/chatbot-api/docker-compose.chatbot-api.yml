version: "3.9"

services:
  chatbot-api:
    build:
      context: ../..
      dockerfile: http-api/chatbot-api/Dockerfile
    container_name: scout-chatbot-api
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CHATBOT_API_KEY: ${CHATBOT_API_KEY:-}
      CHATBOT_API_PORT: 4200
      CHATBOT_API_HOST: 0.0.0.0
      CHATBOT_API_ALLOWED_ORIGINS: ${CHATBOT_API_ALLOWED_ORIGINS:-*}
      CHATBOT_API_BODY_LIMIT_BYTES: ${CHATBOT_API_BODY_LIMIT_BYTES:-262144}
      CHATBOT_API_COMPANY_CACHE_TTL_MS: ${CHATBOT_API_COMPANY_CACHE_TTL_MS:-300000}
      CHATBOT_API_TARGET_APP_CACHE_TTL_MS: ${CHATBOT_API_TARGET_APP_CACHE_TTL_MS:-300000}
      CHATBOT_API_AUTH_CACHE_TTL_MS: ${CHATBOT_API_AUTH_CACHE_TTL_MS:-300000}
      CHATBOT_API_RATE_LIMIT_WINDOW_MS: ${CHATBOT_API_RATE_LIMIT_WINDOW_MS:-60000}
      CHATBOT_API_RATE_LIMIT_MAX_REQUESTS: ${CHATBOT_API_RATE_LIMIT_MAX_REQUESTS:-60}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4200/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
